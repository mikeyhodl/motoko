# This is a test blueprint action that will be called from
# test.yml, where the actual CI is invoked from.
# It will call the tests defined in the flake.nix file.
# These are: common-tests, gc-tests, and tests (debug, release)
# They all take the same install steps, use cachix, and a nix
# command like the following:
#   - run: nix profile install .#nix-build-uncached
#   - name: "Run common tests"
#     run: |
#       cachix watch-exec ic-hs-test -- \  # only when auth token is available
#         nix-build-uncached --max-jobs auto \
#           -E '(builtins.getFlake (toString ./.)).packages.${builtins.currentSystem}.common-tests'

# The main workflow from test.yml will call this workflow with different
# inputs, and this workflow will call the tests defined in the flake.nix file.
#
# Fork PRs run without Cachix push (no auth token available), but still
# benefit from read-only cache access via the `cachix use` substituter.

name: Test Blueprint
description: Runs Motoko tests using nix and cachix

inputs:
  os:
    required: true
    description: "OS to run tests on (ubuntu-latest, macos-15-intel, ubuntu-24.04-arm, macos-latest)"
  test-target:
    required: true
    description: "The test target to run (e.g. common-tests, gc-tests, release-systems-go, debug-systems-go)"
  test-name:
    required: true
    description: "Name of the test to display in logs"
  cachix-auth-token:
    required: false
    default: ''
    description: "Cachix authentication token (optional; fork PRs run without push)"
  max-jobs:
    required: false
    default: 'auto'
    description: "Value passed to `nix-build-uncached --max-jobs`. Defaults to `auto` (one job per host CPU). Lower (e.g. `1`) on memory-constrained runners where parallel ~3 GB derivation builds OOM the runner — see `gc-tests` on `arm64-linux-16`."

runs:
  using: "composite"
  steps:
    - name: Free Disk Space (Ubuntu)
      if: inputs.os == 'ubuntu-latest' || inputs.os == 'ubuntu-24.04-arm'
      uses: jlumbroso/free-disk-space@main
      with:
        swap-storage: false

    - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5

    - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      with:
        name: ic-hs-test
        authToken: ${{ inputs.cachix-auth-token }}

    - run: nix profile install .#nix-build-uncached
      shell: bash

    - name: "Run ${{ inputs.test-name }}"
      run: |
        prefix=()
        if [ -n "$CACHIX_AUTH_TOKEN" ]; then
          prefix=(cachix watch-exec ic-hs-test --)
        fi
        "${prefix[@]}" \
        nix-build-uncached -build-flags "--max-jobs ${{ inputs.max-jobs }}" \
        -E '(builtins.getFlake (toString ./.)).packages.${builtins.currentSystem}.${{ inputs.test-target }}'
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
