name: build

on:
  push:
    branches:
    - master

jobs:
  # Build on multiple platforms for continuous integration
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-15-intel, ubuntu-24.04-arm, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
    - if: ${{ startsWith(matrix.os, 'ubuntu-') }}
      uses: nixbuild/nixbuild-action@edba7779b0a251b622d4250d263540f50c0f1a0b # v25
      with:
        nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}
        generate_summary_for: 'workflow'
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: ic-hs-test
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - name: nix-build
      shell: bash
      run: |
        cachix watch-exec ic-hs-test -- \
          ${{ github.workspace }}/nixbuild.sh -L \
            .#release.moc \
            .#release.mo-doc \
            .#js.moc \
            .#js.moc_interpreter

        echo "## checks"
        uname -s -m
        moc="$(${{ github.workspace }}/nixbuildcopy.sh .#release.moc)"
        "$moc/bin/moc" --version
        file "$moc/bin/moc"
        ldd "$moc/bin/moc" || true
