name: "nightly-macos-test"
on:
  schedule:
    - cron: "0 0 * * *"  # Run at midnight UTC every day
  workflow_dispatch:  # Allow manual triggering
  
jobs:
  rts-checked:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ic-hs-test
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build `.#rts-checked` (cargo test on darwin)
        run: nix build .#rts-checked --print-out-paths

  common-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Common Tests
        uses: ./.github/actions/test-blueprint
        with:
          os: macos-latest
          test-target: common-tests
          test-name: macos-common-tests
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  gc-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run GC Tests
        uses: ./.github/actions/test-blueprint
        with:
          os: macos-latest
          test-target: gc-tests
          test-name: macos-gc-tests
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  systems-go-tests:
    strategy:
      matrix:
        build_type: [release, debug]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Tests
        uses: ./.github/actions/test-blueprint
        with:
          os: macos-latest
          test-target: ${{ matrix.build_type }}-systems-go
          test-name: macos-${{ matrix.build_type }}-tests
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  motoko-core-tests:
    needs: systems-go-tests
    runs-on: ubuntu-latest
    steps:
      - name: Get `motoko` Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Populate `moc`
        uses: ./.github/actions/test-blueprint
        with:
          os: ubuntu-latest
          test-target: moc
          test-name: fetch-moc
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}
      - name: Build `moc`
        run: |
          ${{ github.workspace }}/nixbuildcopy.sh .#moc
      - name: Build M0223-silenced `moc`
        # CI-only: `.#moc-M0223` wraps moc to force M0223 off, so motoko-core's
        # `-E=M0223` (mops.toml) doesn't fail the build on its ~2871 redundant
        # `<T>`s. Built here (before the motoko-core checkout replaces the
        # working dir) and its store path stashed for the fixup step. Drop once
        # #6199 cleans core up.
        run: |
          echo "MOC_M0223=$(${{ github.workspace }}/nixbuildcopy.sh .#moc-M0223)" >> "$GITHUB_ENV"
      - name: Save the `test-blueprint` action
        # This is needed by the "Post Populate `moc`" step (cleanup)
        # but since the checkout of `motoko-core` destroys the `pwd` contents
        # we have to keep it elsewhere and restore later.
        run: cp -r ./.github/actions/test-blueprint ..
      - name: Get `motoko-core` Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: dfinity/motoko-core
          fetch-depth: "0"
      - name: Restore the `test-blueprint` action
        run:  mv ../test-blueprint ./.github/actions
      - name: Set up `mops`
        uses: dfinity/motoko-core/.github/actions/setup@aa4d107c58683530c8bceeac332481eb649913d5 # main
      - name: Set up `mops` cache
        run: |
          npx ic-mops --version
          npx ${DFX_MOC_PATH} --version
      - name: Fixup `mops` cache
        run: |
          # Point mops at the M0223-silenced moc wrapper (.#moc-M0223, built
          # before the checkout). Its store path is used explicitly rather than
          # the `*-moc` glob, since the wrapper and the real moc both end in
          # `-moc`. Remove once motoko-core is cleaned up — see #6199.
          ln -sf "$MOC_M0223/bin/moc" "$(cat .mops/moc-*)"
          npx ${DFX_MOC_PATH} --version
      - name: Run `motoko-core` Tests
        run: npm test

  create-issue:
    needs: [rts-checked, common-tests, gc-tests, systems-go-tests, motoko-core-tests]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest # No need to run on macOS, the ubuntu runner should be cheaper to run.
    steps:
      - name: Create Issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly macOS Test Failure (${date})`,
              body: `Nightly tests for macOS failed. Please investigate.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['macos-failure', 'bug']
            }); 
